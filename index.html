<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Embajadas</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="relative overflow-hidden font-sans text-slate-800">
    <div id="map" class="absolute inset-0 z-10"></div>

    <!-- Botón flotante para abrir/cerrar panel -->
    <button
      id="toggle-panel-btn"
      class="absolute top-4 right-4 z-[1001] w-10 h-10 rounded-lg bg-slate-800/80 hover:bg-slate-700 text-white shadow-lg flex items-center justify-center transition-all duration-200 border border-white/20 backdrop-blur-sm"
      aria-label="Alternar panel"
    >
      <svg id="toggle-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>

    <!-- Panel lateral -->
    <div
      id="panel"
      class="absolute top-4 right-4 z-[1000] w-80 max-h-[calc(100vh-2rem)] overflow-y-auto p-4 bg-white/20 backdrop-blur-md rounded-lg shadow-2xl border border-white/30 transition-all duration-300 flex flex-col gap-3"
    >
      <!-- Encabezado -->
      <div class="flex items-center justify-between">
        <h1 class="text-lg font-bold text-slate-800 flex items-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          Visor de Embajadas
        </h1>
        <button
          id="close-panel-btn"
          class="w-8 h-8 rounded-md bg-white/30 hover:bg-white/50 border border-white/40 shadow-sm flex items-center justify-center text-slate-700 transition-all"
          aria-label="Cerrar panel"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Pestañas -->
      <div class="flex border-b border-white/30">
        <button id="tab-mapa" class="flex-1 py-1.5 text-xs font-semibold text-slate-700 border-b-2 border-blue-500 transition-all">Mapa</button>
        <button id="tab-agenda" class="flex-1 py-1.5 text-xs font-semibold text-slate-400 hover:text-slate-600 border-b-2 border-transparent transition-all">Agenda</button>
      </div>

      <!-- Contenido de la pestaña Mapa -->
      <div id="contenido-mapa" class="flex flex-col gap-3">
        <p class="text-xs text-slate-600/80 -mt-1 flex items-center gap-1">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
          Sube tu Excel para trazar las ubicaciones.
        </p>
        <input type="file" id="excel-upload" accept=".xlsx, .xls" class="hidden" />
        <button
          id="upload-btn"
          class="w-full bg-blue-600/90 hover:bg-blue-700 text-white text-sm font-semibold py-2 px-3 rounded-lg transition-all shadow-md hover:shadow-blue-600/30 flex items-center justify-center gap-2"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
          </svg>
          Cargar Archivo Excel
        </button>

        <div id="sheet-selector-container" class="hidden border-t border-white/30 pt-3">
          <label class="block text-xs font-semibold text-slate-700/90 mb-1.5 flex items-center gap-1">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2" />
            </svg>
            El archivo tiene varias hojas. ¿Cuál usamos?
          </label>
          <select
            id="sheet-select"
            class="w-full text-sm p-1.5 rounded-lg border border-white/30 bg-white/50 backdrop-blur-sm focus:ring-2 focus:ring-blue-500 outline-none"
          ></select>
          <button
            id="process-sheet-btn"
            class="w-full mt-2 bg-slate-800/90 hover:bg-slate-900 text-white text-sm font-semibold py-1.5 px-3 rounded-lg transition-all flex items-center justify-center gap-2"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            Procesar Datos
          </button>
        </div>

        <button
          id="export-img-btn"
          class="w-full bg-emerald-600/90 hover:bg-emerald-700 text-white text-sm font-semibold py-2 px-3 rounded-lg transition-all shadow-md hover:shadow-emerald-600/30 flex items-center justify-center gap-2"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
          Exportar imagen del mapa
        </button>

        <!-- Filtro por tipo -->
        <div class="flex items-center gap-2 border-t border-white/30 pt-3">
          <label for="filtro-tipo" class="text-xs font-semibold text-slate-700">Filtrar:</label>
          <select id="filtro-tipo" class="text-sm p-1 rounded border border-white/30 bg-white/50 backdrop-blur-sm flex-1">
            <option value="todos">Todos</option>
          </select>
        </div>

        <!-- Detalle embajada seleccionada -->
        <div id="detalle-embajada" class="hidden border-t border-white/30 pt-3">
          <h2 class="text-sm font-semibold text-slate-700 mb-2 flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
            </svg>
            Ubicación seleccionada
          </h2>
          <div id="info-embajada" class="text-sm space-y-1">
            <!-- Dinámico -->
          </div>
          <div class="mt-3 pt-3 border-t border-white/30">
            <label class="block text-xs font-semibold text-slate-700 mb-1">Agendar visita</label>
            <div class="flex flex-wrap items-center gap-2">
              <input type="date" id="fecha-visita" class="text-xs p-1 rounded border border-white/30 bg-white/50 backdrop-blur-sm flex-1 min-w-[120px]" />
              <input type="time" id="hora-visita" class="text-xs p-1 rounded border border-white/30 bg-white/50 backdrop-blur-sm flex-1 min-w-[100px]" />
              <button id="btn-agregar-agenda" class="bg-green-600/90 hover:bg-indigo-700 text-white text-xs font-semibold py-1 px-3 rounded-full transition-all flex items-center gap-1">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                Agregar
              </button>
            </div>
          </div>
          <div class="flex flex-wrap gap-2 mt-2">
            <div class="flex items-center gap-1">
              <label class="text-xs text-slate-600 flex items-center gap-1">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                </svg>
                Cercanas:
              </label>
              <input type="number" id="num-cercanas" value="2" min="1" max="10" class="w-12 text-sm p-1 rounded border border-white/30 bg-white/50 backdrop-blur-sm text-center" />
              <button id="btn-calcular-cercanas" class="bg-blue-600/90 hover:bg-blue-700 text-white text-xs font-semibold py-1 px-3 rounded-full transition-all flex items-center gap-1">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                Calcular
              </button>
            </div>
          </div>
        </div>

        <!-- Ubicaciones cercanas -->
        <div id="cercanas-container" class="hidden border-t border-white/30 pt-3">
          <h2 class="text-sm font-semibold text-slate-700 mb-2 flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            Ubicaciones Cercanas
          </h2>
          <div id="lista-cercanas" class="text-sm space-y-2 max-h-60 overflow-y-auto pr-1">
            <!-- Dinámico -->
          </div>
        </div>
      </div>

      <!-- Contenido de la pestaña Agenda -->
      <div id="contenido-agenda" class="hidden flex-col gap-3">
        <div class="flex items-center justify-between">

          <div class="flex gap-1">
            <button id="guardar-agenda-btn" class="bg-emerald-600/90 hover:bg-emerald-700 text-white text-xs font-semibold py-1 px-2 rounded-lg transition-all flex items-center gap-1">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
              </svg>
              Guardar
            </button>
            <button id="cargar-agenda-btn" class="bg-indigo-600/90 hover:bg-indigo-700 text-white text-xs font-semibold py-1 px-2 rounded-lg transition-all flex items-center gap-1">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
              </svg>
              Cargar
            </button>
            <button id="ver-calendario-btn" class="bg-rose-600/90 hover:bg-rose-700 text-white text-xs font-semibold py-1 px-2 rounded-lg transition-all flex items-center gap-1">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              Ver en calendario
            </button>
          </div>
        </div>
        <input type="file" id="agenda-upload" accept=".json" class="hidden" />
        <div id="lista-agenda" class="text-sm space-y-2 max-h-48 overflow-y-auto pr-1">
          <p class="text-xs text-slate-500 italic">Aún no hay embajadas en la agenda.</p>
        </div>
      </div>
    </div>

    <!-- Modal Calendario -->
  <div id="modal-calendario" class="fixed inset-0 z-[1100] flex items-center justify-center bg-black/50 backdrop-blur-sm hidden transition-opacity duration-300">
    <div class="bg-white/90 backdrop-blur-md rounded-2xl shadow-2xl w-full max-w-5xl max-h-[90vh] overflow-y-auto p-6 border border-white/30 relative">
      <button id="cerrar-modal-calendario" class="absolute top-3 right-3 w-8 h-8 rounded-full bg-slate-200/80 hover:bg-slate-300 flex items-center justify-center text-slate-700 transition-all">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
      <h2 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        Calendario de Visitas
      </h2>
      <!-- Contenedor de dos columnas -->
      <div id="calendario-contenedor" class="grid grid-cols-1 md:grid-cols-5 gap-4">
        <!-- Columna izquierda: calendario -->
        <div class="md:col-span-3 space-y-4">
          <div class="flex items-center justify-between">
            <button id="cal-mes-anterior" class="px-3 py-1 bg-slate-200 hover:bg-slate-300 rounded-lg text-sm font-medium transition-all">◀</button>
            <span id="cal-mes-titulo" class="text-lg font-semibold text-slate-700"></span>
            <button id="cal-mes-siguiente" class="px-3 py-1 bg-slate-200 hover:bg-slate-300 rounded-lg text-sm font-medium transition-all">▶</button>
          </div>
          <!-- Grid del calendario -->
          <div id="cal-grid" class="grid grid-cols-7 gap-1 text-center"></div>
        </div>
        <!-- Columna derecha: eventos del día -->
        <div id="cal-eventos-dia" class="md:col-span-2 border-t md:border-t-0 md:border-l border-white/30 pt-3 md:pt-0 md:pl-4">
          <h3 class="text-sm font-semibold text-slate-700 mb-2">Eventos del día</h3>
          <div id="cal-lista-eventos" class="text-sm space-y-2 max-h-60 overflow-y-auto">
            <p class="text-xs text-slate-500 italic">Selecciona un día para ver sus eventos.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

    <div id="toast-alert" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[1000] hidden px-6 py-3 rounded-full shadow-xl text-sm font-medium transition-all duration-300 opacity-0 translate-y-4"></div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
