<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Embajadas</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="relative overflow-hidden font-sans text-slate-800">
    <div id="map" class="absolute inset-0 z-10"></div>

    <!-- Panel flotante (no pegado al borde) -->
    <div
      id="panel"
      class="absolute top-4 right-4 z-[1000] w-64 p-4 bg-white/10 backdrop-blur-xl rounded-2xl shadow-2xl border border-white/20 transition-all duration-300"
    >
      <h1 class="text-lg font-bold text-slate-800 mb-0.5">Visor de Embajadas</h1>
      <p class="text-xs text-slate-600/80 mb-3">Sube tu Excel para trazar las ubicaciones.</p>

      <input type="file" id="excel-upload" accept=".xlsx, .xls" class="hidden" />
      <button
        id="upload-btn"
        class="w-full bg-blue-600/90 hover:bg-blue-700 text-white text-sm font-semibold py-2 px-3 rounded-xl transition-all shadow-md hover:shadow-blue-600/30"
      >
        Cargar Archivo Excel
      </button>

      <!-- Selector de hojas -->
      <div id="sheet-selector-container" class="mt-3 hidden border-t border-white/30 pt-3">
        <label class="block text-xs font-semibold text-slate-700/90 mb-1.5">
          El archivo tiene varias hojas. ¿Cuál usamos?
        </label>
        <select
          id="sheet-select"
          class="w-full text-sm p-1.5 rounded-lg border border-white/30 bg-white/50 backdrop-blur-sm focus:ring-2 focus:ring-blue-500 outline-none"
        ></select>
        <button
          id="process-sheet-btn"
          class="w-full mt-2 bg-slate-800/90 hover:bg-slate-900 text-white text-sm font-semibold py-1.5 px-3 rounded-xl transition-all"
        >
          Procesar Datos
        </button>
      </div>

    </div>

    <!-- Botón toggle para ocultar/mostrar panel (fuera del panel) -->
    <button
      id="toggle-panel"
      class="fixed top-4 right-4 z-[1001] w-8 h-8 rounded-full bg-white/30 backdrop-blur-md border border-white/40 shadow-lg flex items-center justify-center text-slate-700 hover:bg-white/50 transition-all duration-200 text-lg font-bold"
      aria-label="Alternar panel"
    >
      ✕
    </button>

    <div id="toast-alert" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[1000] hidden px-6 py-3 rounded-full shadow-xl text-sm font-medium transition-all duration-300 opacity-0 translate-y-4"></div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
