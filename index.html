<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Embajadas</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="relative overflow-hidden font-sans text-slate-800">
    <div id="map" class="absolute inset-0 z-10"></div>

    <!-- Panel lateral interactivo -->
    <div
      id="panel"
      class="absolute top-4 right-4 z-[1000] w-80 max-h-[calc(100vh-2rem)] overflow-y-auto p-4 bg-white/10 backdrop-blur-xl rounded-2xl shadow-2xl border border-white/20 transition-all duration-300 flex flex-col gap-3"
    >
      <div class="flex items-center justify-between">
        <h1 class="text-lg font-bold text-slate-800">Visor de Embajadas</h1>
        <button
          id="toggle-panel"
          class="w-8 h-8 rounded-full bg-white/30 backdrop-blur-md border border-white/40 shadow-lg flex items-center justify-center text-slate-700 hover:bg-white/50 transition-all duration-200 text-lg font-bold"
          aria-label="Alternar panel"
        >
          ✕
        </button>
      </div>

      <p class="text-xs text-slate-600/80 -mt-1">Sube tu Excel para trazar las ubicaciones.</p>

      <input type="file" id="excel-upload" accept=".xlsx, .xls" class="hidden" />
      <button
        id="upload-btn"
        class="w-full bg-blue-600/90 hover:bg-blue-700 text-white text-sm font-semibold py-2 px-3 rounded-xl transition-all shadow-md hover:shadow-blue-600/30"
      >
        Cargar Archivo Excel
      </button>

      <!-- Selector de hojas -->
      <div id="sheet-selector-container" class="hidden border-t border-white/30 pt-3">
        <label class="block text-xs font-semibold text-slate-700/90 mb-1.5">
          El archivo tiene varias hojas. ¿Cuál usamos?
        </label>
        <select
          id="sheet-select"
          class="w-full text-sm p-1.5 rounded-lg border border-white/30 bg-white/50 backdrop-blur-sm focus:ring-2 focus:ring-blue-500 outline-none"
        ></select>
        <button
          id="process-sheet-btn"
          class="w-full mt-2 bg-slate-800/90 hover:bg-slate-900 text-white text-sm font-semibold py-1.5 px-3 rounded-xl transition-all"
        >
          Procesar Datos
        </button>
      </div>

      <!-- Sección de detalles de la embajada seleccionada -->
      <div id="detalle-embajada" class="hidden border-t border-white/30 pt-3">
        <h2 class="text-sm font-semibold text-slate-700 mb-2">Embajada Seleccionada</h2>
        <div id="info-embajada" class="text-sm space-y-1">
          <!-- Se llena dinámicamente -->
        </div>
        <div class="flex flex-wrap gap-2 mt-2">
          <div class="flex items-center gap-1">
            <label class="text-xs text-slate-600">Cercanas:</label>
            <input type="number" id="num-cercanas" value="2" min="1" max="10" class="w-12 text-sm p-1 rounded border border-white/30 bg-white/50 backdrop-blur-sm text-center" />
            <button id="btn-calcular-cercanas" class="bg-blue-600/90 hover:bg-blue-700 text-white text-xs font-semibold py-1 px-3 rounded-full transition-all">
              Calcular
            </button>
          </div>
        </div>
      </div>

      <!-- Sección de embajadas cercanas -->
      <div id="cercanas-container" class="hidden border-t border-white/30 pt-3">
        <h2 class="text-sm font-semibold text-slate-700 mb-2">Embajadas Cercanas</h2>
        <div id="lista-cercanas" class="text-sm space-y-2 max-h-60 overflow-y-auto pr-1">
          <!-- Se llena dinámicamente -->
        </div>
      </div>

    </div>

    <div id="toast-alert" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[1000] hidden px-6 py-3 rounded-full shadow-xl text-sm font-medium transition-all duration-300 opacity-0 translate-y-4"></div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
