<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Embajadas</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./style.css">
  </head>
  <body class="relative overflow-hidden font-sans text-slate-800">
    
    <div id="map"></div>

    <div class="absolute top-4 left-4 z-20 w-80 p-6 bg-white/80 backdrop-blur-md rounded-2xl shadow-xl border border-white/50">
      <h1 class="text-xl font-bold text-slate-900 mb-2">Visor de Embajadas</h1>
      <p class="text-sm text-slate-600 mb-4">Sube tu archivo Excel para comenzar a trazar las ubicaciones.</p>
      
      <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-xl transition-colors">
        Cargar Excel
      </button>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
